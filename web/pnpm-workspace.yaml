# Marks web/ as its own pnpm workspace root. Without this, pnpm walks up the
# directory tree looking for a workspace and can adopt one outside the repo
# (e.g. a stray ~/pnpm-workspace.yaml), linking node_modules to it.
packages: []

# Force the transitive @babel/core (pulled in by eslint-plugin-react-hooks,
# build/lint-time only) to a patched release. Fixes Dependabot advisory
# GHSA-4x5r-pxfx-6jf8; 7.29.0 is the vulnerable pin. Remove once a direct
# dependency requires >=7.29.6 on its own.
overrides:
  "@babel/core": "^7.29.6"
  # Force transitive undici to patched releases (both lines are test/build-time
  # only: 6.x via @actions/http-client, 7.x via jsdom). Fixes Dependabot
  # advisories for Set-Cookie SameSite downgrade, Set-Cookie header injection,
  # SOCKS5 cross-origin routing, and keep-alive response-queue poisoning.
  # Remove each line once a direct dependency requires the patched range itself.
  "undici@6": "^6.27.0"
  "undici@7": "^7.28.0"
