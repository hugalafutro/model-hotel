version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    errcheck:
      check-type-assertions: false

  exclusions:
    rules:
      # Test files: errcheck noise from defer os.RemoveAll, w.Write in httptest, etc.
      - path: _test\.go
        linters:
          - errcheck

      # The recover() return value is intentionally discarded in panic-safety guards
      - linters:
          - errcheck
        source: "defer func\\(\\) \\{ recover\\(\\) \\}\\(\\)"
