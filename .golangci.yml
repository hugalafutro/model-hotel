version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Added per code review (Point 19):
    - gosec        # Security issues (hardcoded credentials, SQL injection, weak crypto)
    - gocritic     # Style and performance checks (unchecked range values, sloppy realloc)
    - revive       # Drop-in golint replacement with extra rules
    - gocyclo      # Cyclomatic complexity (warning-only via severity)
    - errorlint    # Proper error wrapping/inspection (errors.Is, errors.As)
    - nilerr       # Checks for returning nil even if err != nil
    - bodyclose    # HTTP response body must be closed

  settings:
    errcheck:
      check-type-assertions: false

    gocyclo:
      min-complexity: 15

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    gosec:
      excludes:
        - G101 # Hardcoded credentials (many false positives on config keys)
        - G404 # Weak random (InsecureRandRead — we only use crypto/rand)

  exclusions:
    rules:
      # Test files: errcheck noise from defer os.RemoveAll, w.Write in httptest, etc.
      # Also exclude gosec G104 (unhandled errors) in test files - os.Setenv, json.Decode, etc.
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - gosec
          - gocyclo

      # SA5011 (possible nil deref) is noise in tests: constructors that never
      # return nil are routinely nil-checked then used, and values guarded by a
      # preceding t.Fatal(f) are safe (staticcheck doesn't always model the
      # terminating call). Scoped to test files so SA5011 stays active in prod.
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA5011"

      # Front Desk reaches admin-configured member instances (an internal HA
      # fleet) through the guarded probe client (netguard.go): a dial-time block
      # on unspecified/link-local/cloud-metadata IPs - post-resolution, so DNS
      # rebinding is caught too - plus cross-host redirect refusal. gosec's SSRF
      # taint analysis (G704) can't see that mitigation, so the member-URL
      # request in memberapi.go is a false positive. Scoped to this file only so
      # SSRF detection stays active everywhere else (e.g. the proxy/provider path).
      - path: internal/frontdesk/memberapi\.go
        linters:
          - gosec
        text: "G704"

      # The recover() return value is intentionally discarded in panic-safety guards
      - linters:
          - errcheck
        source: "defer func\\(\\) \\{ recover\\(\\) \\}\\(\\)"

      # Generated migration files have long functions
      - path: internal/db/migrations/
        linters:
          - gocyclo

      # gocyclo is advisory, not CI-blocking (any file)
      - path: ".*"
        linters:
          - gocyclo

      # gocritic style/performance suggestions are advisory
      - linters:
          - gocritic
        text: "hugeParam|rangeValCopy|importShadow|unnamedResult|nestingReduce|exitAfterDefer|deferInLoop|sprintfQuotedString"

      # revive unused-parameter and package-comments are advisory
      - linters:
          - revive
        text: "unused-parameter|package-comments"

formatters:
  enable:
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule