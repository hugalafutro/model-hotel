# Docker Compose override for stress testing.
# Usage: docker compose -f docker-compose.yml -f docker-compose.stress-test.yml up -d
#
# Two modes:
#   1. Bridge networking (default): proxy in Docker bridge, mock on host via host.docker.internal
#   2. Host networking: uncomment network_mode, PORT, POSTGRES_HOST lines below
#
# Common changes:
#   - ALLOW_HTTP_PROVIDERS=true  (mock server uses HTTP)
#   - RATE_LIMIT_ENABLED=false  (controlled per-scenario via settings API)
#   - DATABASE_MAX_CONNS=100    (avoid DB pool bottleneck under load)

services:
    app:
        # network_mode: host
        environment:
            - ALLOW_HTTP_PROVIDERS=true
            - RATE_LIMIT_ENABLED=false
            - DATABASE_MAX_CONNS=100
            - DATABASE_MIN_CONNS=10
            # Bridge networking: mock server on host
            - ALLOWED_PROVIDER_HOSTS=host.docker.internal
            # Host networking: uncomment these, comment ALLOWED_PROVIDER_HOSTS above
            # - PORT=:8081
            # - POSTGRES_HOST=localhost
            # - ALLOWED_PROVIDER_HOSTS=localhost
        extra_hosts:
            - "host.docker.internal:host-gateway"
