# Docker Compose override for local development.
# Usage: docker compose -f docker-compose.yml -f compose.dev.yml up -d
#
# Changes from production defaults:
#   - Docker socket mounted (container-level stats in sidebar)
#   - DEBUG_LOG=true (verbose structured logging)
#
# ⚠️  Docker socket access allows the container to control the Docker daemon.
#     Only use in trusted development environments.

services:
    app:
        restart: unless-stopped
        environment:
            - DEBUG_LOG=true
            - KNOWN_PROXIES=192.168.1.101/32
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
