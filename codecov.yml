coverage:
  precision: 1
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%

ignore:
  - "cmd/"
  - "tools/"
  - "web/src/test/"
  - "web/src/main.tsx"
  - "**/*.d.ts"
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"

flags:
  backend:
    paths:
      - "internal/"
    carryforward: true
  frontend:
    paths:
      - "web/src/"
    carryforward: true

comment:
  layout: "header, flags, files, footer"
  behavior: default
