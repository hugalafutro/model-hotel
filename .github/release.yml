# Config for GitHub's auto-generated release notes, produced by
# `gh release create --generate-notes` in docker-publish.yml.
#
# Categories match on PR *labels* (GitHub does not categorize by title), so the
# buckets below fill in only when PRs are labeled; the catch-all `*` category
# means unlabeled PRs are never dropped — they just list under "Other Changes".
# Bot-authored PRs are excluded to keep the notes signal-only.
changelog:
  exclude:
    # Pure-Bellhop PRs (auto-labeled by labeler.yml) have their own changelog
    # on the bellhop-vX.Y.Z releases; keep them out of the MH/FD notes.
    labels:
      - bellhop
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions
      - github-actions[bot]
      - greptile-apps
      - greptile-apps[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 🔧 Build & CI
      labels:
        - ci
        - build
        - chore
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - "*"
