name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Cancel superseded runs when a PR branch is force-pushed/updated, but never
# cancel in-flight runs on master itself.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: changeme
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modelhotel
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pg_dump / pg_restore for backup tests
        # The backup integration tests (internal/api/backup_test.go) exec
        # pg_dump and pg_restore; without these binaries ~26 tests t.Skip and
        # the backup/restore round-trip goes entirely untested. ubuntu-latest's
        # postgresql-client meta-package ships v16, matching the postgres:16
        # service container.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://modelhotel:${{ env.POSTGRES_PASSWORD }}@localhost:5433/testdb?sslmode=disable
        # gotestsum wraps `go test` to emit a JUnit report for Codecov Test
        # Analytics while still writing coverage.out for the gate below.
        run: >-
          go run gotest.tools/gotestsum@v1.13.0
          --junitfile=go-test-report.junit.xml
          --
          -timeout 5m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage (80% threshold)
        run: |
          # Filter out cmd/ and tools/ from coverage calculation
          filtered=$(mktemp)
          { head -1 coverage.out; grep -vE '^github\.com/hugalafutro/model-hotel/(cmd|tools)/' coverage.out | tail -n +2; } > "$filtered"
          pct=$(go tool cover -func="$filtered" | tail -1 | awk '{print $NF}' | tr -d '%')
          rm -f "$filtered"
          pct_int=${pct%%.*}
          echo "Coverage: ${pct}%"
          if [ "$pct_int" -lt 80 ]; then
            echo "FAIL: coverage ${pct}% is below 80% threshold"
            exit 1
          fi

      - name: Upload Go coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Upload even on test failure — capturing failed tests is the point of
      # Test Analytics. Uses CODECOV_TOKEN (the coverage token), which the
      # test-results endpoint accepts.
      - name: Upload Go test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: go-test-report.junit.xml
          flags: backend
          report_type: test_results

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.11

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

  # Unlike the image scan's gobinary check, govulncheck does reachability
  # analysis: it only fails on vulnerable functions our code actually calls.
  govulncheck:
    name: Go Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  i18n-check:
    name: i18n Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Fails when any locale is missing keys, breaks {{placeholder}} parity,
      # or ships a new English-only string. This check is fully OFFLINE.
      # Fix locally by translating the new keys into all locales by hand;
      # intentional English goes into tools/i18n-translate/allow-english.json.
      - name: locale sync check
        run: make i18n-check

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      # Uses the preinstalled shellcheck on the runner for run: blocks
      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color

  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check (biome)
        # `biome check` (no --write) fails on any formatter/linter/assist drift,
        # so formatting + import-order + lint regressions are caught at PR time.
        run: pnpm run format

      - name: Build
        # CODECOV_TOKEN enables the bundle-analysis plugin's upload (gated on the
        # var being set, so only CI uploads — local/Docker builds stay silent).
        # Bundle analysis needs the repo-scoped bundle token; the coverage
        # CODECOV_TOKEN is a different value the bundle endpoint rejects (404).
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_BUNDLE_TOKEN }}
        run: pnpm run build

  # The 5k-test vitest suite was the sole CI wall-clock bottleneck (~7-8 min),
  # so it is split into parallel shards. Each shard writes a blob report (with
  # embedded coverage); frontend-coverage merges them for the gate + Codecov.
  frontend-test:
    name: Frontend Test (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # blob feeds the coverage merge in frontend-coverage; junit feeds Codecov
      # Test Analytics (one report per shard, aggregated by commit on Codecov).
      # github-actions surfaces failures as inline log annotations so a flaky or
      # failing test is named directly in the Actions log (blob and junit write
      # only to files, leaving the console silent on failure).
      - name: Test (shard ${{ matrix.shard }}/3)
        run: >-
          pnpm exec vitest run --coverage
          --reporter=blob --outputFile.blob=.vitest-reports/blob-${{ matrix.shard }}.json
          --reporter=junit --outputFile.junit=vitest-${{ matrix.shard }}.junit.xml
          --reporter=github-actions
          --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: web/.vitest-reports/*
          include-hidden-files: true
          retention-days: 1

      - name: Upload frontend test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: web/vitest-${{ matrix.shard }}.junit.xml
          flags: frontend
          report_type: test_results

  frontend-coverage:
    name: Frontend Coverage Gate
    needs: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vitest-blob-*
          path: web/.vitest-reports
          merge-multiple: true

      - name: Merge shard reports + coverage
        run: pnpm exec vitest --mergeReports --coverage

      - name: Check frontend coverage (80% threshold)
        run: |
          # The merge step above always writes this; a missing file means the
          # shard merge failed, so fail loudly rather than skip the gate.
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "FAIL: no coverage-summary.json — shard merge produced no coverage"
            exit 1
          fi
          pct=$(python3 -c "
          import json,sys
          d=json.load(open('coverage/coverage-summary.json'))
          total=d.get('total',{})
          pct=total.get('lines',{}).get('pct',0)
          print(pct)
          ")
          pct_int=${pct%%.*}
          echo "Frontend coverage: ${pct}%"
          if [ "$pct_int" -lt 80 ]; then
            echo "FAIL: frontend coverage ${pct}% is below 80% threshold"
            exit 1
          fi

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Guards against THIRD-PARTY-NOTICES.md drifting from the actual dependency
  # set: regenerate it and fail if the committed copy differs. The generator is
  # deterministic, so any diff means someone changed deps without running
  # `make notices`.
  notices:
    name: Third-Party Notices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # make notices shells out to `pnpm licenses list`, which needs the
      # production graph installed from the committed lockfile.
      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Regenerate notices
        run: make notices

      - name: Verify THIRD-PARTY-NOTICES.md is up to date
        run: |
          if ! git diff --exit-code THIRD-PARTY-NOTICES.md; then
            echo "THIRD-PARTY-NOTICES.md is stale — run 'make notices' and commit the result." >&2
            exit 1
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -t model-hotel:ci .

      # Gate on fixable HIGH/CRITICAL vulns only: ignore-unfixed keeps CI green
      # when a CVE has no upstream patch yet (nothing actionable), and the
      # `apk upgrade` in the Dockerfile means a fixable Alpine CVE usually
      # clears on rebuild alone.
      - name: Scan image for fixable HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: model-hotel:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  # Publish a rolling :dev image to Docker Hub on every master commit, so a
  # second "staging" instance can track master by pointing its compose image:
  # line at <DOCKERHUB_USERNAME>/model-hotel:dev (vs :latest for prod).
  #
  # This is a dedicated job (not a step in docker-build) so it can `needs:` the
  # full required gate set: a master commit that fails Go tests, lint, vet,
  # vulncheck, coverage, i18n, the workflow lint, the frontend gates, or the
  # Docker build + Trivy scan never becomes a staging image. It runs only on
  # direct pushes to master (never PRs, which can't see secrets) and skips if
  # master HEAD has already moved past this commit, so a slow older run can't
  # overwrite :dev with a stale image after a newer commit already published it.
  # The image carries no VERSION build-arg, so it self-reports version "dev".
  # :dev is a moving tag the prune workflow leaves untouched (it only prunes
  # vX.Y.Z releases and orphaned sha- tags).
  publish-dev:
    name: Publish :dev image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - go-test
      - go-lint
      - go-vet
      - govulncheck
      - i18n-check
      - workflow-lint
      - frontend-checks
      - frontend-test
      - frontend-coverage
      - notices
      - docker-build
    # No concurrency group on purpose: GitHub keeps only one *pending* job per
    # group and cancels an older pending one when a newer queues, which could
    # drop a fully-gated publish candidate. Instead every run builds and the
    # push step re-checks HEAD, so only the run that is still master HEAD at push
    # time publishes (newest-wins, never a rollback).
    permissions:
      contents: read
    env:
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/model-hotel
      DOCKERHUB_FRONTDESK_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/model-hotel-frontdesk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Early bail-out: if this commit is already behind master HEAD, skip the
      # whole build/scan. This is only an optimization — the authoritative guard
      # is the re-check in the push step, which closes the window where HEAD
      # moves while this job is still building.
      - name: Skip if already superseded by a newer master commit
        id: head
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          remote_head=$(git ls-remote origin refs/heads/master | cut -f1)
          if [ -z "$remote_head" ]; then
            echo "::error::could not read master HEAD from origin"
            exit 1
          fi
          if [ "$remote_head" = "$COMMIT_SHA" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "master HEAD is $remote_head, not $COMMIT_SHA; skipping stale :dev publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if only non-image files changed
        id: changes
        if: steps.head.outputs.skip == 'false'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # The :dev image carries the compiled Go binary (cmd/ + internal/)
          # and the built+embedded frontend (web/src, web/public, configs, deps).
          # Changes to docs, screenshots, wiki, AGENTS.md, CI workflows, the
          # Makefile, and test files cannot affect it — skip the expensive
          # build/scan/push when none of the changed files touch that surface.
          # Fail closed: if the diff can't be computed, build rather than risk a
          # stale :dev.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "no base commit (first push or force-push); building to be safe"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true)
          if [ -z "$changed" ]; then
            echo "could not compute diff; building to be safe"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Drop test files — they are not compiled into the binary or bundled.
          src=$(printf '%s\n' "$changed" | grep -vE '(_test\.go|\.test\.tsx?|\.spec\.tsx?)$' || true)
          # Image-affecting surface = everything the Dockerfiles COPY into a
          # build stage that the Go/Vite builds actually consume: backend source
          # (internal/, cmd/), both frontends (web/, frontdesk/web/ — each is
          # COPYed wholesale), the Dockerfiles + entrypoint scripts, .dockerignore,
          # and the Go module files. Kept broad on purpose: a wasted build is
          # cheap, a stale :dev is not. A genuinely new top-level build input
          # (another COPY source) must be added here.
          code=$(printf '%s\n' "$src" | grep -E '^(internal/|cmd/|web/|frontdesk/web/|Dockerfile|docker-entrypoint|\.dockerignore|go\.mod|go\.sum)' || true)
          if [ -n "$code" ]; then
            echo "image-affecting changes; building :dev:"
            printf '%s\n' "$code"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "no image-affecting changes; skipping :dev build. All changed files:"
            printf '%s\n' "$changed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.changes.outputs.skip == 'false'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.skip == 'false'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Build the candidate and load it into the local daemon so the very image
      # that gets scanned is the image that gets pushed (same digest). Scanning
      # docker-build's separate artifact would not cover base-image/Alpine drift
      # between that job and this rebuild.
      - name: Build :dev candidate (load for scan)
        if: steps.changes.outputs.skip == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: model-hotel:dev-candidate
          # VERSION is left at its `dev` default; stamp the source SHA so the
          # dashboard can show which commit this :dev image was built from.
          build-args: COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false

      - name: Scan :dev candidate for fixable HIGH/CRITICAL vulnerabilities
        if: steps.changes.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: model-hotel:dev-candidate
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      # Same build/scan for the Front Desk control-plane image, so the :dev
      # staging fleet gets a matching model-hotel-frontdesk:dev. A distinct gha
      # cache scope keeps it off the main image's cache; the push below is gated
      # on the same HEAD re-check so both images publish together or not at all.
      - name: Build :dev Front Desk candidate (load for scan)
        if: steps.changes.outputs.skip == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.frontdesk
          load: true
          tags: model-hotel-frontdesk:dev-candidate
          # VERSION stays at its `dev` default; stamp the source SHA so the
          # footer can show which commit this :dev image was built from.
          build-args: COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=frontdesk
          cache-to: type=gha,mode=max,scope=frontdesk
          platforms: linux/amd64
          provenance: false

      - name: Scan :dev Front Desk candidate for fixable HIGH/CRITICAL vulnerabilities
        if: steps.changes.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: model-hotel-frontdesk:dev-candidate
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      # Re-check HEAD immediately before pushing: if a newer master commit landed
      # while this job was building/scanning, that newer run will publish its own
      # image, so this (now-stale) run must not overwrite :dev with an older one.
      - name: Push the scanned images as :dev (only if still HEAD)
        if: steps.changes.outputs.skip == 'false'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          remote_head=$(git ls-remote origin refs/heads/master | cut -f1)
          if [ -z "$remote_head" ]; then
            echo "::error::could not read master HEAD from origin"
            exit 1
          fi
          if [ "$remote_head" != "$COMMIT_SHA" ]; then
            echo "master HEAD moved to $remote_head; skipping stale :dev push for $COMMIT_SHA"
            exit 0
          fi
          docker tag model-hotel:dev-candidate "${DOCKERHUB_IMAGE}:dev"
          docker push "${DOCKERHUB_IMAGE}:dev"
          docker tag model-hotel-frontdesk:dev-candidate "${DOCKERHUB_FRONTDESK_IMAGE}:dev"
          docker push "${DOCKERHUB_FRONTDESK_IMAGE}:dev"