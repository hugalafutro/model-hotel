name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Cancel superseded runs when a PR branch is force-pushed/updated, but never
# cancel in-flight runs on master itself.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: changeme
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modelhotel
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://modelhotel:${{ env.POSTGRES_PASSWORD }}@localhost:5433/testdb?sslmode=disable
        run: go test -timeout 5m -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage (80% threshold)
        run: |
          # Filter out cmd/ and tools/ from coverage calculation
          filtered=$(mktemp)
          { head -1 coverage.out; grep -vE '^github\.com/hugalafutro/model-hotel/(cmd|tools)/' coverage.out | tail -n +2; } > "$filtered"
          pct=$(go tool cover -func="$filtered" | tail -1 | awk '{print $NF}' | tr -d '%')
          rm -f "$filtered"
          pct_int=${pct%%.*}
          echo "Coverage: ${pct}%"
          if [ "$pct_int" -lt 80 ]; then
            echo "FAIL: coverage ${pct}% is below 80% threshold"
            exit 1
          fi

      - name: Upload Go coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

  # Unlike the image scan's gobinary check, govulncheck does reachability
  # analysis: it only fails on vulnerable functions our code actually calls.
  govulncheck:
    name: Go Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  i18n-check:
    name: i18n Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Fails when any locale is missing keys, breaks {{placeholder}} parity,
      # or ships a new English-only string. Fix locally with `make i18n-fill`
      # (DeepL) and review the diff; intentional English goes into
      # tools/i18n-translate/allow-english.json.
      - name: locale sync check
        run: make i18n-check

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      # Uses the preinstalled shellcheck on the runner for run: blocks
      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm vitest run --coverage

      - name: Check frontend coverage (80% threshold)
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "WARNING: no coverage-summary.json, skipping gate"
            exit 0
          fi
          pct=$(python3 -c "
          import json,sys
          d=json.load(open('coverage/coverage-summary.json'))
          total=d.get('total',{})
          pct=total.get('lines',{}).get('pct',0)
          print(pct)
          ")
          pct_int=${pct%%.*}
          echo "Frontend coverage: ${pct}%"
          if [ "$pct_int" -lt 80 ]; then
            echo "FAIL: frontend coverage ${pct}% is below 80% threshold"
            exit 1
          fi
 
      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build Docker image
        run: docker build -t model-hotel:ci .

      # Gate on fixable HIGH/CRITICAL vulns only: ignore-unfixed keeps CI green
      # when a CVE has no upstream patch yet (nothing actionable), and the
      # `apk upgrade` in the Dockerfile means a fixable Alpine CVE usually
      # clears on rebuild alone.
      - name: Scan image for fixable HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: model-hotel:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1