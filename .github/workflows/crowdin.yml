name: Crowdin Action

on:
  push:
    branches: [master]
    paths:
      - "web/src/i18n/locales/en.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Persist the PAT (not the default GITHUB_TOKEN) as the git credential
          # so the localization branch push below is authenticated by it.
          # Without this, actions/checkout bakes in the default token, the
          # Crowdin action's `git push` uses it, and GitHub suppresses the
          # resulting pull_request event — leaving the Crowdin PR's required
          # checks stuck until a manual close/reopen. A PAT-authored push DOES
          # trigger ci.yml, so this is what actually removes the dance.
          token: ${{ secrets.CROWDIN_PAT }}

      - name: crowdin action
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          # Export every translated string regardless of approval state.
          # This hobby project does not proofread/approve translations, so
          # requiring approval (the Crowdin project default) exported empty
          # files and wiped translations. Pin it false so a project-setting
          # flip can never silently re-break the download.
          export_only_approved: false
          skip_untranslated_strings: false
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_body: "New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)"
          pull_request_labels: "i18n"
          pull_request_base_branch_name: master
        env:
          # Authenticate the branch push + PR creation with a PAT (not the
          # default GITHUB_TOKEN). GitHub deliberately does NOT trigger
          # workflows for events made by the default token, which left the
          # Crowdin PR's required checks stuck on "pending". A PAT makes the
          # push/PR look like a real identity, so ci.yml runs automatically —
          # no more close/reopen dance. PAT needs repo Contents + Pull
          # requests write, plus the workflow scope.
          GITHUB_TOKEN: ${{ secrets.CROWDIN_PAT }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
