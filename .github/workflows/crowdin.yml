name: Crowdin Action

on:
  push:
    branches: [master]
    paths:
      - "web/src/i18n/locales/en.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: crowdin action
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          # Export every translated string regardless of approval state.
          # This hobby project does not proofread/approve translations, so
          # requiring approval (the Crowdin project default) exported empty
          # files and wiped translations. Pin it false so a project-setting
          # flip can never silently re-break the download.
          export_only_approved: false
          skip_untranslated_strings: false
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_body: "New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)"
          pull_request_labels: "i18n"
          pull_request_base_branch_name: master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
