name: Crowdin Action

on:
  push:
    branches: [master]
    paths:
      - "web/src/i18n/locales/en.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: crowdin action
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2
        with:
          upload_sources: true
          upload_translations: false
          auto_approve_imported: true
          download_translations: true
          skip_untranslated_strings: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_body: "New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)"
          pull_request_labels: "i18n"
          pull_request_base_branch_name: master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Fill empty translations from source
        run: |
          sudo chown -R $(id -u):$(id -g) web/src/i18n/locales/
          python3 -c '
          import json, glob, os
          with open("web/src/i18n/locales/en.json") as f:
              en = json.load(f)
          for fpath in glob.glob("web/src/i18n/locales/??.json"):
              if "en.json" in fpath:
                  continue
              with open(fpath) as f:
                  d = json.load(f)
              def fill(trans, src):
                  out = {}
                  for k, v in src.items():
                      if isinstance(v, dict):
                          out[k] = fill(trans.get(k, {}), v)
                      else:
                          tv = trans.get(k, "")
                          out[k] = tv if tv != "" else v
                  return out
              d = fill(d, en)
              with open(fpath, "w") as f:
                  json.dump(d, f, indent="\t", ensure_ascii=False)
                  f.write("\n")
              print(f"  {os.path.basename(fpath)}: filled")
          '
