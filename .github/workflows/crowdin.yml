name: Crowdin Translations

on:
  push:
    branches: [master]
    paths:
      - "web/src/i18n/locales/en.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    name: Sync Crowdin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Crowdin Sync
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2
        with:
          # Upload source strings when en.json changes on master
          upload_sources: true
          # Don't upload translations — en is the source language and
          # upload_translations tries to push ALL locale files including
          # en.json, which CrowdIn rejects ("Project doesn't have 'en'
          # language(s)"). Source upload handles en.json already.
          upload_translations: false
          # Download translated files and create a PR
          download_translations: true
          # Only include fully translated + approved strings
          skip_untranslated_strings: true
          export_only_approved: true
          # PR configuration
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_labels: "i18n"
          pull_request_base_branch_name: master
          # Use crowdin.yml at repo root for file mapping
          config: "crowdin.yml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
