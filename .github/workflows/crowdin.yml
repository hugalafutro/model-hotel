name: Crowdin Action

on:
  push:
    branches: [master]
    paths:
      - "web/src/i18n/locales/en.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: crowdin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          skip_untranslated_files: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: "New Crowdin translations"
          pull_request_body: "New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)"
          pull_request_labels: "i18n"
          pull_request_base_branch_name: master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Strip empty translation values
        run: |
          python3 -c '
          import json, glob, os
          for f in glob.glob("web/src/i18n/locales/?.json"):
              with open(f) as fh: d = json.load(fh)
              def strip(obj):
                  out = {}
                  for k, v in obj.items():
                      if isinstance(v, dict):
                          s = strip(v)
                          if s: out[k] = s
                      elif v != "": out[k] = v
                  return out
              d = strip(d)
              with open(f, "w") as fh:
                  json.dump(d, fh, indent="\t", ensure_ascii=False)
                  fh.write("\n")
              print(f"  {os.path.basename(f)}: cleaned")
          '
