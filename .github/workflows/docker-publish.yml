name: Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - .version
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/model-hotel
  DOCKERHUB_FRONTDESK_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/model-hotel-frontdesk

jobs:
  publish:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "skip_existing=false" >> "$GITHUB_OUTPUT"
          else
            ver=$(tr -d '[:space:]' < .version)
            tag="v${ver}"
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
              echo "Tag ${tag} already exists, skipping build"
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "skip_existing=true" >> "$GITHUB_OUTPUT"
            else
              echo "New version: ${tag}"
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "skip_existing=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create git tag
        if: steps.version.outputs.skip_existing == 'false' && github.event_name != 'workflow_dispatch'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Log in to GHCR
        if: steps.version.outputs.skip_existing == 'false'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.version.outputs.skip_existing == 'false'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.version.outputs.skip_existing == 'false'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        if: steps.version.outputs.skip_existing == 'false'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push
        if: steps.version.outputs.skip_existing == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false

      # Front Desk control-plane image (HA stack), published to the same two
      # registries under the -frontdesk repo. Reuses the Buildx instance and
      # registry logins above; a distinct gha cache scope keeps it off the
      # server image's cache so neither build evicts the other's layers.
      - name: Extract metadata (Front Desk)
        if: steps.version.outputs.skip_existing == 'false'
        id: meta-frontdesk
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontdesk
            ${{ env.DOCKERHUB_FRONTDESK_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Build and push Front Desk
        if: steps.version.outputs.skip_existing == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.frontdesk
          push: true
          tags: ${{ steps.meta-frontdesk.outputs.tags }}
          labels: ${{ steps.meta-frontdesk.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=frontdesk
          cache-to: type=gha,mode=max,scope=frontdesk
          platforms: linux/amd64
          provenance: false

      # Publish a GitHub Release for the freshly-pushed tag with auto-generated
      # notes (grouped per .github/release.yml). Until now each release got a
      # git tag + image but no human-readable notes; this fills that gap so
      # self-hosters can see what changed before pulling. Non-blocking.
      - name: Create GitHub Release
        if: steps.version.outputs.skip_existing == 'false' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --verify-tag \
            --generate-notes \
            --latest \
            --title "${{ steps.version.outputs.tag }}"

      # Sync the Docker Hub repository README from the tracked, Hub-tailored
      # copy (absolute URLs only — the GitHub README's relative links break on
      # Docker Hub, so the two are deliberately separate documents; it lives
      # at the repo root next to README.md so doc updates don't miss it). The
      # file is uploaded verbatim; nothing is rewritten. Requires the
      # DOCKERHUB_TOKEN PAT to have read/write/delete scope. Non-blocking: a
      # failed README sync must never fail a release.
      - name: Sync Docker Hub README
        if: steps.version.outputs.skip_existing == 'false'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./DOCKERHUB.md

      # Sync the Front Desk repo's Hub README from DOCKERHUB-frontdesk.md. Not
      # gated on skip_existing: the Front Desk page is near-static and the sync
      # is cheap, so we refresh it on every workflow run (including when the
      # version tag already exists) to keep it current without needing a release.
      # Non-blocking, same as the main README sync.
      - name: Sync Docker Hub README (Front Desk)
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_FRONTDESK_IMAGE }}
          readme-filepath: ./DOCKERHUB-frontdesk.md
