name: Android

on:
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

# Cancel superseded runs when a PR branch is force-pushed/updated, but never
# cancel in-flight runs on master itself.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    name: Bellhop (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Android Lint
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: bellhop-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
