name: Android

on:
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

# Cancel superseded runs when a PR branch is force-pushed/updated, but never
# cancel in-flight runs on master itself.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    name: Bellhop (lint + test + build)
    runs-on: ubuntu-latest
    # The whole job normally finishes in ~5 min; a deadlocked test JVM once
    # sat silent for hours, so cap it well above normal and far below never.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Android Lint
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bellhop-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
