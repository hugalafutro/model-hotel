services:
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      - MASTER_KEY=${MASTER_KEY:-default-master-key-change-in-production}
      - DATABASE_URL=postgres://llmproxy:changeme@db:5432/llmproxy
      - DISCOVERY_INTERVAL=30m
      - ALLOW_HTTP_PROVIDERS=false
      - DATA_DIR=/data
    volumes:
      - ./.data:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=llmproxy
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=llmproxy
    volumes:
      - ./.data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmproxy"]
      interval: 5s
      timeout: 5s
      retries: 5
