<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1050" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background: transparent -->
  <rect width="900" height="1200" fill="none" rx="0"/>

  <!-- HTTP Request (top card) -->
  <rect x="280" y="20" width="340" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="20" width="340" height="24" rx="8" fill="#3b82f6" opacity="0.15"/>
  <clipPath id="cpInput"><rect x="280" y="20" width="340" height="60" rx="8"/></clipPath>
  <g clip-path="url(#cpInput)">
    <text x="450" y="37" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">HTTP Request</text>
  </g>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="10">Authorization: Bearer sk-xxxx...</text>

  <line x1="450" y1="80" x2="450" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ProxyKeyMiddleware (pill) -->
  <rect x="300" y="105" width="300" height="42" rx="21" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="131" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">ProxyKeyMiddleware</text>

  <line x1="450" y1="147" x2="450" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Main flow container -->
  <rect x="50" y="175" width="800" height="850" rx="10" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="200" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600" letter-spacing="1">REQUEST PROCESSING PIPELINE</text>

  <!-- Step 1: ParseBearerToken -->
  <rect x="90" y="225" width="720" height="56" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="255" fill="#60a5fa" font-size="12" font-weight="700">1. ParseBearerToken()</text>
  <text x="310" y="255" fill="#94a3b8" font-size="11">Extract Bearer token from Authorization header</text>
  <line x1="450" y1="281" x2="450" y2="299" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: virtualkey.Hash(token) -->
  <rect x="90" y="305" width="720" height="56" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="335" fill="#60a5fa" font-size="12" font-weight="700">2. virtualkey.Hash(token)</text>
  <text x="330" y="335" fill="#94a3b8" font-size="11">Compute SHA-256 hash of the plaintext token</text>
  <line x1="450" y1="361" x2="450" y2="379" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: FindByKeyHash(keyHash) -->
  <rect x="90" y="385" width="720" height="56" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="415" fill="#60a5fa" font-size="12" font-weight="700">3. FindByKeyHash(keyHash)</text>
  <text x="340" y="415" fill="#94a3b8" font-size="11">Database lookup in virtual_keys table</text>
  <line x1="450" y1="441" x2="450" y2="459" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Branch label -->
  <text x="450" y="480" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">LOOKUP RESULT</text>

  <!-- NOT FOUND (left) -->
  <rect x="100" y="500" width="220" height="80" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="500" width="220" height="28" rx="8" fill="#f43f5e" opacity="0.15"/>
  <clipPath id="cpNotFound"><rect x="100" y="500" width="220" height="80" rx="8"/></clipPath>
  <g clip-path="url(#cpNotFound)">
    <text x="210" y="518" text-anchor="middle" fill="#fb7185" font-size="12" font-weight="700">NOT FOUND</text>
  </g>
  <text x="210" y="545" text-anchor="middle" fill="#e2e8f0" font-size="10">No matching key_hash in DB</text>
  <text x="210" y="565" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">401 Unauthorized</text>

  <!-- FOUND (right) -->
  <rect x="580" y="500" width="220" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="580" y="500" width="220" height="28" rx="8" fill="#10b981" opacity="0.15"/>
  <clipPath id="cpFound"><rect x="580" y="500" width="220" height="80" rx="8"/></clipPath>
  <g clip-path="url(#cpFound)">
    <text x="690" y="518" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">FOUND</text>
  </g>
  <text x="690" y="545" text-anchor="middle" fill="#e2e8f0" font-size="10">Virtual key record loaded</text>
  <text x="690" y="565" text-anchor="middle" fill="#34d399" font-size="11">Continue processing →</text>

  <!-- Arrows from Step 3 to branches -->
  <line x1="450" y1="465" x2="210" y2="490" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="450" y1="465" x2="690" y2="490" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Continue arrow from FOUND to Step 4 -->
  <line x1="690" y1="580" x2="450" y2="608" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Step 4: Set context values -->
  <rect x="90" y="615" width="720" height="70" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <rect x="90" y="615" width="720" height="26" rx="6" fill="#a78bfa" opacity="0.15"/>
  <clipPath id="cpCtx"><rect x="90" y="615" width="720" height="70" rx="6"/></clipPath>
  <g clip-path="url(#cpCtx)">
    <text x="110" y="633" fill="#c4b5fd" font-size="12" font-weight="700">4. Set context values</text>
  </g>
  <text x="110" y="660" fill="#94a3b8" font-size="10">virtual_key_name, virtual_key_id, virtual_key_hash, rate_limit_rps, rate_limit_burst, max_wait_ms</text>
  <text x="110" y="675" fill="#64748b" font-size="9">Stored in request context for downstream handlers</text>
  <line x1="450" y1="685" x2="450" y2="703" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: TouchLastUsed -->
  <rect x="90" y="710" width="720" height="56" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="90" y="710" width="720" height="26" rx="6" fill="#f59e0b" opacity="0.15"/>
  <clipPath id="cpTouch"><rect x="90" y="710" width="720" height="56" rx="6"/></clipPath>
  <g clip-path="url(#cpTouch)">
    <text x="110" y="728" fill="#fbbf24" font-size="12" font-weight="700">5. TouchLastUsed(keyHash)</text>
  </g>
  <text x="380" y="728" fill="#94a3b8" font-size="11">Async update of last_used timestamp</text>
  <line x1="450" y1="766" x2="450" y2="784" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: next.ServeHTTP() -->
  <rect x="90" y="795" width="720" height="56" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <rect x="90" y="795" width="720" height="26" rx="6" fill="#10b981" opacity="0.15"/>
  <clipPath id="cpNext"><rect x="90" y="795" width="720" height="56" rx="6"/></clipPath>
  <g clip-path="url(#cpNext)">
    <text x="110" y="813" fill="#34d399" font-size="12" font-weight="700">6. next.ServeHTTP()</text>
  </g>
  <text x="310" y="813" fill="#94a3b8" font-size="11">Continue to rate limiter → proxy handler</text>
  <line x1="450" y1="851" x2="450" y2="869" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Rate Limiter box -->
  <rect x="280" y="875" width="340" height="50" rx="6" fill="#1e293b" stroke="#db2777" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="893" text-anchor="middle" fill="#f472b6" font-size="12" font-weight="700">Rate Limiter</text>
  <text x="450" y="910" text-anchor="middle" fill="#94a3b8" font-size="9">Per-key token bucket with optional max_wait_ms</text>
  <line x1="450" y1="925" x2="450" y2="943" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Proxy Handler -->
  <rect x="250" y="950" width="400" height="50" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="968" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Proxy Handler</text>
  <text x="450" y="985" text-anchor="middle" fill="#94a3b8" font-size="10">Forward request to selected upstream provider</text>

</svg>