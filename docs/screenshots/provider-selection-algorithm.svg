<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect x="280" y="10" width="400" height="36" rx="18" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="34" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">Provider Selection Algorithm</text>

  <!-- INPUT -->
  <rect x="80" y="55" width="800" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="55" width="800" height="28" rx="8" fill="#3b82f6" opacity="0.15"/>
  <text x="100" y="73" fill="#93c5fd" font-size="12" font-weight="700">INPUT: FailoverGroup</text>
  <text x="100" y="100" fill="#94a3b8" font-size="11">priority_order = [uuid1, uuid2, uuid3, uuid4]</text>
  <text x="100" y="118" fill="#94a3b8" font-size="11">entry_enabled = {uuid1: true, uuid2: false, uuid3: true, uuid4: true}</text>

  <line x1="480" y1="135" x2="480" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 1 -->
  <rect x="80" y="165" width="800" height="80" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <rect x="80" y="165" width="800" height="26" rx="8" fill="#a78bfa" opacity="0.15"/>
  <text x="100" y="183" fill="#c4b5fd" font-size="12" font-weight="700">STEP 1: Filter by entry_enabled</text>
  <text x="100" y="210" fill="#e2e8f0" font-size="11">Candidates: [uuid1, uuid3, uuid4]</text>
  <text x="100" y="228" fill="#f87171" font-size="10">uuid2 skipped — entry disabled</text>

  <line x1="480" y1="245" x2="480" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 2 -->
  <rect x="80" y="275" width="800" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <rect x="80" y="275" width="800" height="26" rx="8" fill="#3b82f6" opacity="0.15"/>
  <text x="100" y="293" fill="#60a5fa" font-size="12" font-weight="700">STEP 2: Batch load models &amp; providers</text>
  <text x="100" y="318" fill="#94a3b8" font-size="11">Load models: GetByIDs([uuid1, uuid3, uuid4])</text>
  <text x="100" y="336" fill="#94a3b8" font-size="11">Load providers: GetByIDs([prov1, prov3, prov4])</text>

  <line x1="480" y1="345" x2="480" y2="370" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 3 -->
  <rect x="80" y="375" width="800" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="80" y="375" width="800" height="26" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="100" y="393" fill="#fbbf24" font-size="12" font-weight="700">STEP 3: Filter by enabled flags</text>
  <text x="100" y="420" fill="#94a3b8" font-size="11">Skip if model.enabled = false</text>
  <text x="100" y="438" fill="#94a3b8" font-size="11">Skip if provider.enabled = false</text>
  <text x="550" y="420" fill="#e2e8f0" font-size="11">→ [uuid1, uuid3]</text>
  <text x="550" y="438" fill="#f87171" font-size="10">uuid4 skipped — provider disabled</text>

  <line x1="480" y1="455" x2="480" y2="480" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 4 -->
  <rect x="80" y="485" width="800" height="80" rx="8" fill="#1e293b" stroke="#f43f5e" stroke-width="1" filter="url(#shadow)"/>
  <rect x="80" y="485" width="800" height="26" rx="8" fill="#f43f5e" opacity="0.15"/>
  <text x="100" y="503" fill="#fb7185" font-size="12" font-weight="700">STEP 4: Filter by circuit breaker</text>
  <text x="100" y="530" fill="#94a3b8" font-size="11">Skip if circuitBreaker.IsOpen(providerID) = true</text>
  <text x="550" y="530" fill="#e2e8f0" font-size="11">→ [uuid1]</text>
  <text x="550" y="548" fill="#f87171" font-size="10">uuid3 skipped — circuit open</text>

  <line x1="480" y1="565" x2="480" y2="590" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 5 -->
  <rect x="80" y="595" width="800" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <rect x="80" y="595" width="800" height="26" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="100" y="613" fill="#34d399" font-size="12" font-weight="700">STEP 5: Decrypt API keys</text>
  <text x="100" y="640" fill="#94a3b8" font-size="11">Decrypt each provider's encrypted_key (AES-256-GCM + Argon2id)</text>
  <text x="100" y="658" fill="#94a3b8" font-size="11">Skip if decryption fails (wrong MASTER_KEY)</text>

  <line x1="480" y1="675" x2="480" y2="700" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OUTPUT -->
  <rect x="80" y="705" width="800" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="705" width="800" height="28" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="100" y="723" fill="#34d399" font-size="12" font-weight="700">OUTPUT: Ordered list of model candidates</text>
  <text x="100" y="750" fill="#94a3b8" font-size="11">If empty: return error "no available provider"</text>
  <text x="500" y="750" fill="#94a3b8" font-size="11">If non-empty: pass to failover loop</text>
  <text x="100" y="770" fill="#e2e8f0" font-size="11">Final candidates: [uuid1 with decrypted API key]</text>

</svg>