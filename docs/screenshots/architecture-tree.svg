<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Root -->
  <rect x="260" y="10" width="280" height="40" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="35" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Client Request</text>

  <!-- Arrow to Middleware -->
  <line x1="400" y1="50" x2="400" y2="75" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Middleware -->
  <rect x="290" y="80" width="220" height="36" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="103" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Middleware &amp; Routing</text>

  <!-- Branch lines -->
  <line x1="400" y1="116" x2="400" y2="140" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="700" y2="140" stroke="#475569" stroke-width="1.5"/>

  <!-- Branch 1: /v1/chat/completions — tall and narrow -->
  <line x1="100" y1="140" x2="100" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="10" y="170" width="180" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="10" y="170" width="180" height="24" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="100" y="188" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">/v1/chat/completions</text>
  <text x="25" y="210" fill="#94a3b8" font-size="9">Virtual key auth</text>
  <text x="25" y="226" fill="#94a3b8" font-size="9">Model resolution</text>
  <text x="25" y="242" fill="#94a3b8" font-size="9">Failover routing</text>
  <text x="25" y="258" fill="#94a3b8" font-size="9">Streaming proxy</text>

  <!-- Branch 2: /api/* — tall and narrow -->
  <line x1="300" y1="140" x2="300" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="210" y="170" width="180" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="210" y="170" width="180" height="24" rx="8" fill="#3b82f6" opacity="0.15"/>
  <text x="300" y="188" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">/api/*</text>
  <text x="225" y="210" fill="#94a3b8" font-size="9">CRUD: providers, models</text>
  <text x="225" y="226" fill="#94a3b8" font-size="9">Virtual keys, failover</text>
  <text x="225" y="242" fill="#94a3b8" font-size="9">Settings, stats</text>
  <text x="225" y="258" fill="#94a3b8" font-size="9">Backup, app logs</text>

  <!-- Branch 3: /api/chat/* -->
  <line x1="500" y1="140" x2="500" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="170" width="160" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="420" y="170" width="160" height="24" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="500" y="188" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">/api/chat/*</text>
  <text x="500" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Admin chat proxy</text>
  <text x="500" y="225" text-anchor="middle" fill="#94a3b8" font-size="9">Chat &amp; arena UI</text>

  <!-- Branch 4: /* -->
  <line x1="700" y1="140" x2="700" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="650" y="170" width="100" height="70" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1" filter="url(#shadow)"/>
  <rect x="650" y="170" width="100" height="24" rx="8" fill="#64748b" opacity="0.15"/>
  <text x="700" y="188" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">/*</text>
  <text x="700" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Embedded</text>
  <text x="700" y="225" text-anchor="middle" fill="#94a3b8" font-size="9">React SPA</text>

  <!-- Core packages bar -->
  <rect x="10" y="310" width="780" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="330" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">CORE PACKAGES</text>
  <text x="25" y="350" fill="#34d399" font-size="9" font-weight="600">proxy/</text>
  <text x="70" y="350" fill="#94a3b8" font-size="9">streaming, failover</text>
  <text x="185" y="350" fill="#60a5fa" font-size="9" font-weight="600">provider/</text>
  <text x="245" y="350" fill="#94a3b8" font-size="9">discovery, encryption</text>
  <text x="380" y="350" fill="#fbbf24" font-size="9" font-weight="600">failover/</text>
  <text x="440" y="350" fill="#94a3b8" font-size="9">circuit breaker, routing</text>
  <text x="580" y="350" fill="#c4b5fd" font-size="9" font-weight="600">virtualkey/</text>
  <text x="645" y="350" fill="#94a3b8" font-size="9">auth, rate limiting</text>

</svg>